name: Build SafariBrowser

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.workers.max=2
    -Dorg.gradle.caching=true

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Build Debug APK (every push / PR)
  # ─────────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
            app/build/intermediates
          key: gradle-debug-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-debug-${{ runner.os }}-

      - name: Bootstrap Gradle Wrapper
        run: |
          set -euo pipefail

          # ── 1. Parse Gradle version from wrapper properties ───────────────
          PROPS="gradle/wrapper/gradle-wrapper.properties"
          DIST_URL=$(grep -E '^distributionUrl=' "$PROPS" | cut -d'=' -f2- | tr -d '\r')
          # e.g. https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          DIST_URL="${DIST_URL//\\:/:}"   # unescape \: → :
          GRADLE_VERSION=$(echo "$DIST_URL" | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?(?=-)')
          echo "Detected Gradle version: $GRADLE_VERSION"

          # ── 2+3. Download distribution zip — extract both gradlew and jar ─
          ZIP_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          echo "Downloading distribution from $ZIP_URL"
          TMP_DIR="$(mktemp -d)"
          TMP_ZIP="$TMP_DIR/gradle-dist.zip"
          curl -fsSL "$ZIP_URL" -o "$TMP_ZIP"

          # Find exact paths inside zip (avoids hardcoded subfolder assumptions)
          GRADLEW_ENTRY=$(unzip -l "$TMP_ZIP" | awk '{print $4}' | grep -E '^gradle-[^/]+/gradlew$' | head -1)
          JAR_ENTRY=$(unzip -l "$TMP_ZIP" | awk '{print $4}' | grep -E 'gradle-wrapper(-[0-9.]+)?\.jar$' | head -1)
          echo "Found gradlew entry : $GRADLEW_ENTRY"
          echo "Found wrapper jar   : $JAR_ENTRY"

          # Extract gradlew
          unzip -j "$TMP_ZIP" "$GRADLEW_ENTRY" -d "$TMP_DIR"
          cp "$TMP_DIR/gradlew" gradlew
          chmod +x gradlew

          # Extract gradle-wrapper.jar
          JAR_PATH="gradle/wrapper/gradle-wrapper.jar"
          unzip -j "$TMP_ZIP" "$JAR_ENTRY" -d "$(dirname "$JAR_PATH")"
          # Rename to canonical filename if it has a version suffix
          EXTRACTED_JAR="$(dirname "$JAR_PATH")/$(basename "$JAR_ENTRY")"
          [ "$EXTRACTED_JAR" != "$JAR_PATH" ] && mv "$EXTRACTED_JAR" "$JAR_PATH"

          echo "gradle-wrapper.jar SHA-256: $(sha256sum "$JAR_PATH")"
          ls -lh gradlew "$JAR_PATH"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: safari-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Build & Sign Release APK (main / master / tags only)
  #
  # Keystore strategy — decided at runtime in shell, NOT in step if: conditions.
  # The secrets context is NOT available in step-level if: expressions; it is
  # only available inside env: blocks and run: scripts. Both strategies are
  # handled by a single "Setup keystore" step using shell branching.
  #
  #   Strategy A — production keystore via repository secrets (recommended):
  #     KEYSTORE_BASE64     base64-encoded .jks/.keystore file
  #     KEYSTORE_PASSWORD   store password
  #     KEY_ALIAS           alias inside the keystore
  #     KEY_PASSWORD        key password
  #
  #   Strategy B — auto-generated self-signed keystore (zero config):
  #     When KEYSTORE_BASE64 is absent/empty the step generates a fresh RSA-4096
  #     keystore, signs the APK, and discards the keystore after the run.
  #     The APK installs on any device but is NOT accepted by Google Play.
  # ─────────────────────────────────────────────────────────────────────────────
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master' ||
       startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
            app/build/intermediates
          key: gradle-release-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-release-${{ runner.os }}-

      - name: Bootstrap Gradle Wrapper
        run: |
          set -euo pipefail

          PROPS="gradle/wrapper/gradle-wrapper.properties"
          DIST_URL=$(grep -E '^distributionUrl=' "$PROPS" | cut -d'=' -f2- | tr -d '\r')
          DIST_URL="${DIST_URL//\\:/:}"
          GRADLE_VERSION=$(echo "$DIST_URL" | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?(?=-)')
          echo "Detected Gradle version: $GRADLE_VERSION"

          ZIP_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          echo "Downloading distribution from $ZIP_URL"
          TMP_DIR="$(mktemp -d)"
          TMP_ZIP="$TMP_DIR/gradle-dist.zip"
          curl -fsSL "$ZIP_URL" -o "$TMP_ZIP"

          GRADLEW_ENTRY=$(unzip -l "$TMP_ZIP" | awk '{print $4}' | grep -E '^gradle-[^/]+/gradlew$' | head -1)
          JAR_ENTRY=$(unzip -l "$TMP_ZIP" | awk '{print $4}' | grep -E 'gradle-wrapper(-[0-9.]+)?\.jar$' | head -1)
          echo "Found gradlew entry : $GRADLEW_ENTRY"
          echo "Found wrapper jar   : $JAR_ENTRY"

          unzip -j "$TMP_ZIP" "$GRADLEW_ENTRY" -d "$TMP_DIR"
          cp "$TMP_DIR/gradlew" gradlew
          chmod +x gradlew

          JAR_PATH="gradle/wrapper/gradle-wrapper.jar"
          unzip -j "$TMP_ZIP" "$JAR_ENTRY" -d "$(dirname "$JAR_PATH")"
          EXTRACTED_JAR="$(dirname "$JAR_PATH")/$(basename "$JAR_ENTRY")"
          [ "$EXTRACTED_JAR" != "$JAR_PATH" ] && mv "$EXTRACTED_JAR" "$JAR_PATH"

          echo "gradle-wrapper.jar SHA-256: $(sha256sum "$JAR_PATH")"
          ls -lh gradlew "$JAR_PATH"

      # ── Keystore setup (Strategy A or B chosen at runtime in shell) ───────────
      # IMPORTANT: secrets.* are passed via env: only — never used in if: conditions.
      - name: Setup keystore
        id: keystore
        env:
          SECRET_KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          SECRET_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          SECRET_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${SECRET_KEYSTORE_BASE64:-}" ]; then
            # ── Strategy A: decode keystore from repository secret ─────────
            echo "::notice::Strategy A — keystore from KEYSTORE_BASE64 secret"
            KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"

            echo "$SECRET_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

            keytool -list \
              -keystore  "$KEYSTORE_PATH" \
              -storepass "$SECRET_KEYSTORE_PASSWORD" \
              -noprompt \
              || { echo "::error::Keystore verification failed — wrong KEYSTORE_PASSWORD?"; exit 1; }

            echo "KEYSTORE_PATH=$KEYSTORE_PATH"                >> "$GITHUB_ENV"
            echo "KEYSTORE_PASSWORD=$SECRET_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$SECRET_KEY_ALIAS"                 >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$SECRET_KEY_PASSWORD"           >> "$GITHUB_ENV"
            echo "strategy=secret"                             >> "$GITHUB_OUTPUT"

          else
            # ── Strategy B: generate a self-signed keystore on the fly ─────
            echo "::warning::Strategy B — KEYSTORE_BASE64 not set. Auto-generating keystore. APK will NOT pass Play Store review."
            KEYSTORE_PATH="$RUNNER_TEMP/auto-release.keystore"
            AUTO_PASS="$(openssl rand -hex 12)"
            AUTO_ALIAS="safari-auto-key"

            keytool -genkey -v \
              -keystore  "$KEYSTORE_PATH" \
              -alias     "$AUTO_ALIAS" \
              -keyalg    RSA \
              -keysize   4096 \
              -validity  10000 \
              -storepass "$AUTO_PASS" \
              -keypass   "$AUTO_PASS" \
              -dname     "CN=SafariBrowser CI, OU=GitHub Actions, O=Auto-Generated, L=CI, S=CI, C=US" \
              -noprompt

            echo "Keystore size: $(du -sh "$KEYSTORE_PATH")"

            echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASSWORD=$AUTO_PASS" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$AUTO_ALIAS"        >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$AUTO_PASS"      >> "$GITHUB_ENV"
            echo "strategy=auto"                >> "$GITHUB_OUTPUT"
          fi

      # ── Build Release APK ─────────────────────────────────────────────────────
      - name: Build & Sign Release APK
        run: ./gradlew assembleRelease --stacktrace

      # ── Verify APK signature ──────────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          [ -z "$APK" ] && { echo "::error::No APK found in release output"; exit 1; }
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME/build-tools/"* | sort -V | tail -1)
          "$BUILD_TOOLS/apksigner" verify --verbose "$APK"
          echo "Signature OK: $APK"

      # ── Rename APK ────────────────────────────────────────────────────────────
      - name: Rename APK
        id: rename
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          STRATEGY="${{ steps.keystore.outputs.strategy }}"
          SUFFIX=""
          [ "$STRATEGY" = "auto" ] && SUFFIX="-self-signed"

          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_OUT="SafariBrowser-${VERSION}${SUFFIX}.apk"
          cp "$APK_SRC" "$APK_OUT"

          echo "apk_name=$APK_OUT"   >> "$GITHUB_OUTPUT"
          echo "strategy=$STRATEGY"  >> "$GITHUB_OUTPUT"
          echo "APK ready: $(du -sh "$APK_OUT")"

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-release-${{ github.ref_name }}
          path: ${{ steps.rename.outputs.apk_name }}
          retention-days: 30

      # ── Create GitHub Release on tag push ─────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Lint (every push and PR)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-lint-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml') }}
          restore-keys: gradle-lint-${{ runner.os }}-

      - name: Bootstrap Gradle Wrapper
        run: |
          set -euo pipefail

          PROPS="gradle/wrapper/gradle-wrapper.properties"
          DIST_URL=$(grep -E '^distributionUrl=' "$PROPS" | cut -d'=' -f2- | tr -d '\r')
          DIST_URL="${DIST_URL//\\:/:}"
          GRADLE_VERSION=$(echo "$DIST_URL" | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?(?=-)')
          echo "Detected Gradle version: $GRADLE_VERSION"

          ZIP_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          echo "Downloading distribution from $ZIP_URL"
          TMP_DIR="$(mktemp -d)"
          TMP_ZIP="$TMP_DIR/gradle-dist.zip"
          curl -fsSL "$ZIP_URL" -o "$TMP_ZIP"

          GRADLEW_ENTRY=$(unzip -l "$TMP_ZIP" | awk '{print $4}' | grep -E '^gradle-[^/]+/gradlew$' | head -1)
          JAR_ENTRY=$(unzip -l "$TMP_ZIP" | awk '{print $4}' | grep -E 'gradle-wrapper(-[0-9.]+)?\.jar$' | head -1)
          echo "Found gradlew entry : $GRADLEW_ENTRY"
          echo "Found wrapper jar   : $JAR_ENTRY"

          unzip -j "$TMP_ZIP" "$GRADLEW_ENTRY" -d "$TMP_DIR"
          cp "$TMP_DIR/gradlew" gradlew
          chmod +x gradlew

          JAR_PATH="gradle/wrapper/gradle-wrapper.jar"
          unzip -j "$TMP_ZIP" "$JAR_ENTRY" -d "$(dirname "$JAR_PATH")"
          EXTRACTED_JAR="$(dirname "$JAR_PATH")/$(basename "$JAR_ENTRY")"
          [ "$EXTRACTED_JAR" != "$JAR_PATH" ] && mv "$EXTRACTED_JAR" "$JAR_PATH"

          echo "gradle-wrapper.jar SHA-256: $(sha256sum "$JAR_PATH")"
          ls -lh gradlew "$JAR_PATH"

      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload Lint HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
